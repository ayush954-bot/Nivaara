<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Favicon -->
    <!-- /api/google-favicon serves the logo with Content-Disposition: inline -->
    <!-- Google's favicon crawler follows redirects and checks Content-Disposition -->
    <!-- /favicon.ico redirects to CDN with Content-Disposition: attachment (platform limitation) -->
    <link rel="icon" type="image/png" sizes="512x512" href="/api/google-favicon" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/api/google-favicon" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Nivaara Realty Solutions - Trusted Real Estate India</title>
    <meta name="description" content="Nivaara offers expert real estate services across India & Dubai. Buy, sell, rent properties in Pune, Mumbai, Delhi, Bangalore with full transparency.">
    <meta name="keywords" content="real estate India, property consultants Pune, real estate Dubai, commercial property, investment advisory, Pune real estate">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nivaara Realty Solutions - Real Estate Consultancy Across India & International Markets">
    <meta property="og:description" content="Your trusted real estate partner across India and beyond. From search to paperwork — we manage everything.">
    <meta property="og:image" content="https://files.manuscdn.com/user_upload_by_module/session_file/310419663026719415/DzCZsHdZxYzvZkgo.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nivaara Realty Solutions - Real Estate Consultancy">
    <meta name="twitter:description" content="Your trusted real estate partner across India and beyond.">
    <meta name="twitter:image" content="https://files.manuscdn.com/user_upload_by_module/session_file/310419663026719415/DzCZsHdZxYzvZkgo.png">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a">
    <!-- JSON-LD Organization Schema — tells Google to show Nivaara logo in search results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Nivaara Realty Solutions",
      "alternateName": "Nivaara",
      "url": "https://nivaararealty.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://nivaararealty.com/api/google-favicon",
        "width": 512,
        "height": 512
      },
      "image": "https://nivaararealty.com/api/google-favicon",
      "description": "Nivaara Realty Solutions is your trusted real estate partner across India and international markets. We offer residential and commercial property services in Pune, Mumbai, Delhi, Bangalore, and Dubai.",
      "telephone": "+91-9764515697",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Pune",
        "addressRegion": "Maharashtra",
        "addressCountry": "IN"
      },
      "areaServed": ["Pune", "Mumbai", "Delhi", "Bangalore", "Hyderabad", "Chennai", "Dubai"]
    }
    </script>
    <!-- Add Google Fonts here, example:
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PN5VP7N9Q5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PN5VP7N9Q5');
    </script>
  </body>

</html>
